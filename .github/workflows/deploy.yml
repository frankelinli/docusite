name: Deploy Docusite

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docusite-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 111.230.81.144
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /www/wwwroot/haoyelaiga.com/docusite
            find /www/wwwroot/haoyelaiga.com/docusite -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload build output
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 111.230.81.144
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: build/*
          target: /www/wwwroot/haoyelaiga.com/docusite
          strip_components: 1