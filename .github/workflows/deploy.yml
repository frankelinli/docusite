name: Deploy Docusite

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docusite-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 111.230.81.144
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /www/wwwroot/haoyelaiga.com/docusite

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p 22 111.230.81.144 >> ~/.ssh/known_hosts

      - name: Sync build output with rsync
        run: |
          rsync -az --delete \
            -e "ssh -p 22" \
            build/ root@111.230.81.144:/www/wwwroot/haoyelaiga.com/docusite/